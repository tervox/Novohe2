name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Create local.properties
        run: |
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          echo "PRODUCT_ID_X1=placeholder_x1" >> local.properties
          echo "PRODUCT_ID_X2=placeholder_x2" >> local.properties
          echo "PRODUCT_ID_X3=placeholder_x3" >> local.properties
          echo "PRODUCT_ID_X4=placeholder_x4" >> local.properties
          echo "SUBSCRIPTION_ID_X1=placeholder_sub_x1" >> local.properties
          echo "SUBSCRIPTION_ID_X2=placeholder_sub_x2" >> local.properties
          echo "SUBSCRIPTION_ID_X3=placeholder_sub_x3" >> local.properties
          echo "SUBSCRIPTION_YEAR_ID_X1=placeholder_year_x1" >> local.properties
          echo "SUBSCRIPTION_YEAR_ID_X2=placeholder_year_x2" >> local.properties
          echo "SUBSCRIPTION_YEAR_ID_X3=placeholder_year_x3" >> local.properties

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew assembleFossDebug

      - name: List APK files
        run: find app/build/outputs -name "*.apk"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Gallery-debug
          path: app/build/outputs/apk/foss/debug/
          if-no-files-found: error
